dmpc_coordinator_ros_node:
  ros__parameters:
    # Replace these with the actual Raspberry Pi IP addresses.
    # The controller node on robot1 should bind to port 5601.
    # The controller node on robot2 should bind to port 5602.
    robot_namespaces: ["robot1", "robot2"]
    agent_ids: [1, 2]
    controller_endpoints:
      - "tcp://192.168.178.51:5601"
      - "tcp://192.168.178.52:5602"

    rate_hz: 5.0
    enable_motion: false       # set true only after odom/controller communication is verified
    odom_timeout_s: 1.0

    model: "single_integrator"
    graph: "complete"
    objective_mode: "safe_formation"
    auto_M: false
    M_manual: 5

    # Conservative real-robot DMPC bounds.
    u_bound: 0.08
    r_bound: 5.0
    dt: 0.20

    # Safety and formation geometry.
    # For n_agents=2 and formation_radius_override=0, the desired pair distance is
    # d_form = d_safe + formation_margin = 0.80 m. Keep d_agent_exit < d_form.
    d_safe: 0.65
    formation_margin: 0.15
    formation_rotation_rad: 0.0
    formation_radius_override: 0.0

    # Explicit-hybrid safety thresholds and hysteresis.
    safety_warning_radius: 1.20
    obstacle_warning_radius: 1.20
    d_agent_enter: 0.70
    d_agent_exit: 0.75
    d_obs_enter: 0.45
    d_obs_exit: 0.85

    # Single-integrator explicit-hybrid gains.
    modeC_repulsion_gain_si: 0.90
    modeO_target_gain_si: 0.95
    modeCO_repulsion_gain_si: 0.90
    modeCO_target_gain_si: 0.85
    nominal_blend_C_si: 0.35
    nominal_blend_O_si: 0.20
    nominal_blend_CO_si: 0.15

    # Practical safety-filter margins.
    pair_filter_margin: 0.04
    obs_filter_margin: 0.05
    filter_projection_passes: 4

    safety_enabled: true
    obstacles_enabled: false

    w_track: 8.0
    w_du: 3.0
    w_u: 0.3

    # World-vector to differential-drive conversion.
    max_linear_speed: 0.07
    max_angular_speed: 0.35
    world_command_to_speed_scale: 1.0
    heading_gain: 1.8
    linear_deadband: 0.005
    stop_for_heading_error_rad: 1.20
    allow_reverse: false
